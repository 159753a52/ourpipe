# GPT 8-GPU (2节点) - ZeroBubble 调度器
#
# 架构: 2 节点 × 4 GPU = 8 个 stage
# 调度器: ZeroBubble (ZB-H1)
#
# ZeroBubble 将反向传播拆分为 B (input gradient) 和 W (weight gradient)，
# W 延迟执行以填充 pipeline bubble。
# 需要配合 BubbleLinear 使用（pipeline_runner.py 中自动转换）。
#
# 使用方法:
#   sbatch submit_2nodes_all.sh configs/gpt_8gpu_zerobubble.yaml

model:
  name: gpt
  hidden_size: 512
  num_layers: 16
  num_heads: 16
  sequence_length: 128
  vocab_size: -1
  extra:
    head_size: 32
    ff_low_rank: null
    dropout: 0.1

dataset:
  name: code_search_net
  batch_size: 64
  num_workers: 0
  extra: {}

training:
  learning_rate: 0.0001
  epochs: 2
  num_microbatches: 8     # ZeroBubble 建议使用更多 microbatch 以充分利用 B/W 分离
  gradient_accumulation: 1
  max_iterations: -1
  profile_iteration: 20
  exit_after_profile: true

parallel:
  model_parallel_size: 8  # 8 个 stage (2节点 × 4 GPU)
  data_parallel_size: 1
  scheduler: zerobubble
  use_orion_scheduler: false
