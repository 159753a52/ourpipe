# GPT 8-GPU (2节点) - Hanayo 双向流水线调度器
#
# 架构: 2 节点 × 4 GPU = 8 个 stage
# 调度器: Hanayo (双向流水线)
#
# 注意:
#   - Hanayo 将 batch 拆成 2 * num_microbatches 份
#   - batch_size 必须能被 2 * num_microbatches 整除
#   - 64 / (2 * 8) = 4（每个 micro-batch 4 个样本）✓
#
# 使用方法:
#   sbatch submit_2nodes_all.sh configs/gpt_8gpu_hanayo.yaml

model:
  name: gpt
  hidden_size: 512
  num_layers: 16
  num_heads: 16
  sequence_length: 128
  vocab_size: -1
  extra:
    head_size: 32
    ff_low_rank: null
    dropout: 0.1

dataset:
  name: code_search_net
  batch_size: 64          # 64 / (2 * 8) = 4 ✓ 能整除
  num_workers: 0
  extra: {}

training:
  learning_rate: 0.0001
  epochs: 2
  num_microbatches: 8     # Hanayo 实际使用 2*8=16 个 micro-batch
  gradient_accumulation: 1
  max_iterations: -1
  profile_iteration: 20
  exit_after_profile: true

parallel:
  model_parallel_size: 8  # 8 个 stage (2节点 × 4 GPU)
  data_parallel_size: 1
  scheduler: hanayo
  use_orion_scheduler: false
